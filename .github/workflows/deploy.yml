name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/affectionate-darwin-iybcfl
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

# Allow one concurrent deployment; newer runs cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # While the repo's Pages source is "Deploy from a branch", GitHub also runs
      # its own pages-build-deployment on every push, publishing the RAW source
      # (which a browser can't run) and racing this workflow. Wait for it to
      # finish so our built site always deploys last and wins.
      - name: Wait for branch-based Pages build (avoid deploy race)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The API may lag a few seconds before the pages-build-deployment run
          # for this commit is even listed, so "no run in progress" is NOT proof
          # it's done. Wait until we positively observe a COMPLETED run for this
          # exact SHA; only give up after a generous timeout (covers the case
          # where Pages source has been switched to "GitHub Actions" and the
          # branch build no longer exists).
          for i in $(seq 1 24); do
            completed=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs?head_sha=${{ github.sha }}&per_page=100" \
              | jq '[.workflow_runs[] | select(.name == "pages build and deployment" or .name == "pages-build-deployment") | select(.status == "completed")] | length')
            if [ "${completed:-0}" -ge 1 ] 2>/dev/null; then
              echo "Branch-based Pages build completed — deploying the built site after it."
              exit 0
            fi
            echo "Branch-based Pages build not finished yet (attempt $i/24)…"
            sleep 10
          done
          echo "No branch-based Pages build observed within timeout — deploying."
      - id: deployment
        uses: actions/deploy-pages@v4
